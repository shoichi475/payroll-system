<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Payroll System</title>
  <link rel="stylesheet" href="style.css"/>
</head>
<body>

<!-- SIDEBAR -->
<div class="sidebar">
  <div class="sidebar-header">
    <div class="logo-circle">PS</div>
    <div class="sidebar-title">
      <h1>PAYROLL SYSTEM</h1>
      <p>Employee Record & Salary Management</p>
    </div>
  </div>

  <nav class="sidebar-nav">
    <button class="nav-item active" id="nav-home" onclick="showPage('home','HOME')">HOME</button>
    <button class="nav-item" id="nav-add" onclick="showPage('add','NEW EMPLOYEE')">ADD NEW EMPLOYEE</button>
    <button class="nav-item" id="nav-time" onclick="showPage('time','TIME IN & OUT')">TIME IN & OUT</button>
    <button class="nav-item" id="nav-file" onclick="showPage('file','EMPLOYEE FILES')">CHECK FILE</button>
    <button class="nav-item" id="nav-search" onclick="showPage('search','SEARCH')">SEARCH</button>
    <button class="nav-item" id="nav-update" onclick="showPage('update','UPDATE INFORMATION')">UPDATE</button>
  </nav>
</div>

<!-- MAIN -->
<div class="main">
  <div class="topbar"><h2 id="pageTitle">HOME</h2></div>

  <div class="content">

    <!-- HOME -->
    <div class="page active" id="page-home">
      <div class="card">
        <h1>Welcome to Payroll System</h1>
        <p>Manage employees, attendance, and salary efficiently.</p>
      </div>
    </div>

    <!-- ADD -->
    <div class="page" id="page-add">
      <form onsubmit="submitAdd(event)">
        <div class="card">
          <h3>Employee Info</h3>

          <input id="fname" placeholder="First Name">
          <input id="mname" placeholder="Middle Name">
          <input id="lname" placeholder="Last Name">
          <input id="address" placeholder="Address">
          <input id="empid" placeholder="0000-000">
          <input id="dept" placeholder="Department">
          <input id="email" placeholder="Email">
          <input id="number" placeholder="11-digit number">
          <input id="date" type="date">
          <input id="rate" type="number" placeholder="Rate">
          <input id="hours" type="number" placeholder="Hours">

          <button type="submit">SAVE</button>
        </div>
      </form>
    </div>

    <!-- TIME -->
    <div class="page" id="page-time">
      <div class="card">
        <input id="timeID" placeholder="Employee ID">
        <input id="timeIn" type="time">
        <input id="timeOut" type="time">
        <button onclick="saveTime()">SAVE TIME</button>
        <p id="timeMsg"></p>
      </div>
    </div>

    <!-- SEARCH -->
    <div class="page" id="page-search">
      <div class="card">
        <input id="searchID" placeholder="Search ID">
        <input id="searchName" placeholder="Search Name">
        <input id="searchSalary" placeholder="Salary">
        <button onclick="doSearch()">SEARCH</button>
        <div id="searchResult"></div>
      </div>
    </div>

    <!-- FILE -->
    <div class="page" id="page-file">
      <div class="card">
        <button onclick="renderFullFile()">LOAD FILES</button>
        <div id="fileList"></div>
      </div>
    </div>

    <!-- UPDATE -->
    <div class="page" id="page-update">
      <div class="card">
        <input id="updateID" placeholder="Employee ID">
        <button onclick="findEmployee()">FIND</button>

        <div id="editForm" style="display:none">
          <input id="ufname">
          <input id="umname">
          <input id="ulname">
          <input id="uaddress">
          <input id="uemp_id">
          <input id="udept">
          <input id="uemail">
          <input id="unumber">
          <input id="udate" type="date">
          <input id="urate" type="number">
          <input id="uhours" type="number">
          <button onclick="saveUpdate(event)">SAVE</button>
        </div>
      </div>
    </div>

  </div>
</div>

<script src="script.js"></script>
</body>
</html>
